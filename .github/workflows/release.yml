# Release workflow — builds Windows installer and publishes to GitHub Releases.
#
# Triggers:
# 1) Tag push: push a tag matching v* (e.g. v2.10.7). `npm version patch && git push --follow-tags`
#    creates a v-prefixed tag by default.
# 2) Manual: Actions → Build and Release → Run workflow (uses production env).
#
# Env wiring: GitHub "Environment variables" use `vars.*`. "Environment secrets" use `secrets.*`.
# The expressions below prefer `vars` then fall back to `secrets` so either setup works.
#
# If runs stay "Waiting": check Repo → Settings → Environments → production (required reviewers).
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (optional). Example: refs/tags/v2.10.7 or main'
        required: false
        default: ''

permissions:
  contents: write

# One release at a time; do not cancel a publish mid-flight.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_APP_SCHEMA: ${{ vars.VITE_SUPABASE_APP_SCHEMA || secrets.VITE_SUPABASE_APP_SCHEMA }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Tag pushes: github.ref is refs/tags/vX.Y.Z. Manual runs: optional ref, else default branch.
        ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Build and Package (electron-builder)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-builder --win --x64 --publish always

    - name: Normalize GitHub release visibility
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $isPreReleaseTag = $tag -match '-'
        if ($isPreReleaseTag) {
          gh release edit "$tag" --prerelease=true
          Write-Host "Marked $tag as prerelease (private lane)."
        } else {
          gh release edit "$tag" --prerelease=false
          Write-Host "Marked $tag as stable release (public lane)."
        }
