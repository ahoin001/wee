# Release workflow — builds Windows installer and publishes to GitHub Releases.
#
# Triggers:
# 1) Tag push: push a tag matching v* (e.g. v2.10.7). `npm version patch && git push --follow-tags`
#    creates a v-prefixed tag by default.
# 2) Manual: Actions → Build and Release → Run workflow with a tag ref (refs/tags/vX.Y.Z).
#
# Env wiring: GitHub "Environment variables" use `vars.*`. "Environment secrets" use `secrets.*`.
# The expressions below prefer `vars` then fall back to `secrets` so either setup works.
#
# If runs stay "Waiting": check Repo → Settings → Environments → production (required reviewers).
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag ref to build. Must be refs/tags/vX.Y.Z'
        required: true
        default: ''

permissions:
  contents: write

# One release at a time; do not cancel a publish mid-flight.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    environment: production
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_APP_SCHEMA: ${{ vars.VITE_SUPABASE_APP_SCHEMA || secrets.VITE_SUPABASE_APP_SCHEMA }}

    steps:
    - name: Resolve release ref
      id: release_ref
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $ref = "${{ github.event.inputs.ref }}".Trim()
          if (-not $ref) { throw "workflow_dispatch requires a tag ref (refs/tags/vX.Y.Z)" }
          if (-not $ref.StartsWith("refs/tags/v")) {
            throw "workflow_dispatch ref must be a version tag (refs/tags/v...). Got: $ref"
          }
          $tag = $ref.Substring("refs/tags/".Length)
        } else {
          $ref = "${{ github.ref }}"
          $tag = "${{ github.ref_name }}"
          if (-not $ref.StartsWith("refs/tags/v")) {
            throw "Release workflow only runs on v* tags. Got: $ref"
          }
        }
        "ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        Write-Host "Release ref=$ref tag=$tag"

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.release_ref.outputs.ref }}
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Assert tag matches package.json version
      shell: pwsh
      run: |
        $tag = "${{ steps.release_ref.outputs.tag }}"
        $pkgVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
        $expected = "v$pkgVersion"
        if ($tag -ne $expected) {
          throw "Tag/version mismatch: tag=$tag package.json=$pkgVersion (expected $expected)"
        }
        Write-Host "Tag matches package.json: $tag"

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Build and Package (electron-builder)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-builder --win --x64 --publish always

    - name: Normalize GitHub release visibility
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        $tag = "${{ steps.release_ref.outputs.tag }}"
        $isPreReleaseTag = $tag -match '-'
        if ($isPreReleaseTag) {
          gh release edit "$tag" --prerelease=true
          Write-Host "Marked $tag as prerelease (private lane)."
        } else {
          gh release edit "$tag" --prerelease=false
          Write-Host "Marked $tag as stable release (public lane)."
        }

    - name: Verify GitHub release for electron-updater
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REF_NAME: ${{ steps.release_ref.outputs.tag }}
      run: node scripts/verify-github-release.cjs
